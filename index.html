<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin 明信片圖鑑 | Postcard Explorer</title>
    <meta name="description" content="探索來自全球 82 個國家、979 張 Pikmin Bloom 明信片的精美圖鑑。依國家、分類、標籤篩選，發現世界各地的美麗景點。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Hero Section -->
    <header id="hero" class="hero">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>
        <div class="hero-content">
            <div class="hero-badge">🌍 來自全球 82 個國家</div>
            <h1 class="hero-title">
                <span class="title-line">Pikmin</span>
                <span class="title-line accent">明信片圖鑑</span>
            </h1>
            <p class="hero-subtitle">探索 979 張來自世界各地的 Pikmin Bloom 明信片</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="stat-total">979</span>
                    <span class="stat-label">張明信片</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number">82</span>
                    <span class="stat-label">個國家</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number">29</span>
                    <span class="stat-label">種分類</span>
                </div>
            </div>
            <button class="hero-cta" onclick="document.getElementById('gallery').scrollIntoView({behavior:'smooth'})">
                開始探索
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
            </button>
        </div>
        <div class="hero-scroll-indicator">
            <div class="scroll-dot"></div>
        </div>
    </header>

    <!-- Filter & Controls Section -->
    <section id="gallery" class="controls-section">
        <div class="container">
            <!-- Search Bar -->
            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="search-input" class="search-input" placeholder="搜尋明信片名稱、城市、國家...">
                <button id="search-clear" class="search-clear hidden" onclick="clearSearch()">✕</button>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs-wrapper">
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-tab active" data-filter="all">
                        <span class="tab-icon">🌐</span>
                        <span>全部</span>
                    </button>
                    <button class="filter-tab" data-filter="type">
                        <span class="tab-icon">🍄</span>
                        <span>類型</span>
                    </button>
                    <button class="filter-tab" data-filter="country">
                        <span class="tab-icon">🗺️</span>
                        <span>國家</span>
                    </button>
                    <button class="filter-tab" data-filter="category">
                        <span class="tab-icon">📁</span>
                        <span>分類</span>
                    </button>
                    <button class="filter-tab" data-filter="tag">
                        <span class="tab-icon">🏷️</span>
                        <span>標籤</span>
                    </button>
                </div>
            </div>

            <!-- Filter Chips Container -->
            <div class="filter-chips-container" id="filter-chips-container">
                <!-- Populated dynamically -->
            </div>

            <!-- Active Filters -->
            <div class="active-filters" id="active-filters">
                <!-- Populated dynamically -->
            </div>

            <!-- Results Count & Sort -->
            <div class="results-bar">
                <span class="results-count" id="results-count">顯示 979 張明信片</span>
                <div class="sort-wrapper">
                    <label for="sort-select">排序：</label>
                    <select id="sort-select" class="sort-select">
                        <option value="default">預設</option>
                        <option value="title-asc">名稱 A→Z</option>
                        <option value="title-desc">名稱 Z→A</option>
                        <option value="country-asc">國家 A→Z</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Masonry Gallery -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid" id="gallery-grid">
                <!-- Cards populated dynamically -->
            </div>
            <div class="load-more-wrapper" id="load-more-wrapper">
                <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">
                    載入更多
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                </button>
            </div>
            <div class="no-results hidden" id="no-results">
                <div class="no-results-icon">🔍</div>
                <h3>找不到結果</h3>
                <p>試試調整篩選條件或關鍵字</p>
            </div>
        </div>
    </section>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
            <div class="modal-image-wrapper">
                <img id="modal-image" class="modal-image" src="" alt="" loading="lazy">
            </div>
            <div class="modal-body">
                <h2 id="modal-title" class="modal-title"></h2>
                <div class="modal-meta">
                    <span class="modal-type" id="modal-type"></span>
                    <span class="modal-location" id="modal-location"></span>
                </div>
                <div class="modal-categories" id="modal-categories"></div>
                <div class="modal-tags" id="modal-tags"></div>
                <div class="modal-coords" id="modal-coords"></div>
            </div>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Pikmin 明信片圖鑑 — 資料來源：Pikmin Bloom 社群資料庫</p>
            <p class="footer-sub">本站僅供個人收藏與學習用途 • 非官方網站</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
